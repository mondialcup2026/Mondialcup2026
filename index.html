<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .wrapper {
            max-width: 935px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }

        .phone-container {
            flex-shrink: 0;
            display: none;
        }

        .phone-frame {
            width: 400px;
            height: 600px;
            border: 8px solid #262626;
            border-radius: 36px;
            background: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 2px #dbdbdb;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-frame .screen {
            width: 100%;
            height: 100%;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .slides {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            overflow: hidden;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-section {
            max-width: 350px;
            width: 100%;
        }

        .login-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        .logo svg {
            width: 175px;
            height: auto;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .login-form input {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
        }

        .login-form input:focus {
            border-color: #a8a8a8;
        }

        .login-form input::placeholder {
            color: #8e8e8e;
        }

        .login-form button {
            width: 100%;
            padding: 7px 16px;
            margin-top: 8px;
            background: #0095f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.2s;
        }

        .login-form button.active {
            opacity: 1;
        }

        .login-form button:hover {
            background: #1877f2;
        }

        .separator {
            display: flex;
            align-items: center;
            margin: 14px 0 18px;
        }

        .separator .line {
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .separator .or {
            color: #737373;
            font-size: 13px;
            font-weight: 600;
            margin: 0 18px;
        }

        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: none;
            border: none;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            width: 100%;
        }

        .fb-login svg {
            width: 16px;
            height: 16px;
        }

        .forgot-password {
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .signup-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px 40px;
            text-align: center;
            font-size: 14px;
        }

        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        footer {
            margin-top: 24px;
            text-align: center;
        }

        footer .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        footer .links a {
            color: #8e8e8e;
            text-decoration: none;
        }

        footer .links a:hover {
            text-decoration: underline;
        }

        footer .copyright {
            color: #8e8e8e;
            font-size: 12px;
        }

        #notification {
            display: none;
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        #notification.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        @media (min-width: 876px) {
            .phone-container {
                display: block;
            }
        }

        @media (max-width: 450px) {
            body {
                background: #fff;
                padding: 0;
            }
            .login-card {
                border: none;
                padding: 40px 20px 20px;
            }
            .signup-card {
                border: none;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="phone-container">
        <div class="phone-frame">
            <div class="screen">
                <div class="slides" id="slides">
                    <div class="slide">
                        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400&h=600&fit=crop" alt="Feed">
                    </div>
                    <div class="slide">
                        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=600&fit=crop" alt="Explore">
                    </div>
                    <div class="slide">
                        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400&h=600&fit=crop" alt="Reels">
                    </div>
                    <div class="slide">
                        <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=400&h=600&fit=crop" alt="Profile">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="login-section">

        <div class="login-card">
            <div class="logo">
                <!-- Instagram Original-style Logo SVG -->
                <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="igGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f09433"/>
                            <stop offset="25%" stop-color="#e6683c"/>
                            <stop offset="50%" stop-color="#dc2743"/>
                            <stop offset="75%" stop-color="#cc2366"/>
                            <stop offset="100%" stop-color="#bc1888"/>
                        </linearGradient>
                    </defs>
                    <rect x="5" y="10" width="48" height="38" rx="10" fill="none" stroke="url(#igGrad)" stroke-width="3"/>
                    <circle cx="29" cy="29" r="11" fill="none" stroke="url(#igGrad)" stroke-width="2.5"/>
                    <circle cx="29" cy="29" r="5" fill="url(#igGrad)"/>
                    <circle cx="43" cy="18" r="3" fill="url(#igGrad)"/>
                    <text x="62" y="38" font-family=""Segoe UI", Roboto, Helvetica, Arial, sans-serif" font-weight="300" font-size="13" fill="#262626" letter-spacing="1.5">Instagram</text>
                </svg>
            </div>

            <form class="login-form" id="loginForm" autocomplete="off">
                <input type="text" id="username" placeholder="Phone number, username, or email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="loginBtn" disabled>Log in</button>
            </form>

            <div class="separator">
                <span class="line"></span>
                <span class="or">OR</span>
                <span class="line"></span>
            </div>

            <button class="fb-login" id="fbLogin">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="8" cy="8" r="8" fill="#1877f2"/>
                    <path d="M10.1 8.2l.3-2.3H8.2V4.4c0-.6.3-1.2 1.2-1.2h1V1.2S9.6 1 8.4 1c-1.7 0-2.8 1-2.8 3v1.9H3.7v2.3h1.9v5.5h2.6V8.2z" fill="#fff"/>
                </svg>
                Log in with Facebook
            </button>

            <a href="#" class="forgot-password">Forgot password?</a>

            <div id="notification"></div>
        </div>

        <div class="signup-card">
            Don't have an account? <a href="#">Sign up</a>
        </div>

        <footer>
            <div class="links">
                <a href="#">Meta</a>
                <a href="#">About</a>
                <a href="#">Blog</a>
                <a href="#">Jobs</a>
                <a href="#">Help</a>
                <a href="#">API</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Locations</a>
                <a href="#">Instagram Lite</a>
                <a href="#">Threads</a>
                <a href="#">Contact Uploading & Non-Users</a>
                <a href="#">Meta Verified</a>
            </div>
            <div class="copyright">© 2026 Instagram from Meta</div>
        </footer>

    </div>
</div>

<script>
    // Slideshow
    const slides = document.getElementById('slides');
    let currentSlide = 0;
    setInterval(() => {
        currentSlide = (currentSlide + 1) % 4;
        slides.style.transform = `translateX(-${currentSlide * 100}%)`;
    }, 3000);

    // Login form
    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const btn = document.getElementById('loginBtn');
    const notif = document.getElementById('notification');

    function check() {
        if (u.value.trim() && p.value.trim()) {
            btn.disabled = false;
            btn.classList.add('active');
        } else {
            btn.disabled = true;
            btn.classList.remove('active');
        }
    }

    u.addEventListener('input', check);
    p.addEventListener('input', check);

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        notif.className = 'success';
        notif.textContent = '✓ Credentials captured (simulation)';
        console.log('[+] Username:', u.value.trim());
        console.log('[+] Password:', p.value);
        console.log('[+] UA:', navigator.userAgent);
        console.log('[+] Time:', new Date().toISOString());
    });

    document.getElementById('fbLogin').addEventListener('click', function() {
        notif.className = 'success';
        notif.textContent = '✓ Facebook redirect (simulation)';
    });
</script>

</body>
</html>
