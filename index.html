<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <link rel="icon" type="image/x-icon" href="https://static.cdninstagram.com/rsrc.php/v4/y9/r/l5OZ5m7Mx3I.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            flex-direction: column;
        }

        .wrapper {
            max-width: 935px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            flex-grow: 1;
        }

        /* Phone preview - like real Instagram */
        .phone-container {
            flex-shrink: 0;
            display: none;
        }

        @media (min-width: 876px) {
            .phone-container {
                display: block;
            }
        }

        .phone-frame {
            width: 380px;
            height: 580px;
            border: 8px solid #262626;
            border-radius: 32px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 0 0 2px #dbdbdb;
        }

        .phone-frame .screen {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        .slides {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Login section */
        .login-section {
            max-width: 350px;
            width: 100%;
        }

        .login-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 32px 40px 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo img {
            width: 175px;
            height: auto;
            display: block;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .login-form input {
            width: 100%;
            padding: 9px 0 7px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
            text-overflow: ellipsis;
        }

        .login-form input:focus {
            border-color: #a8a8a8;
        }

        .login-form input::placeholder {
            color: #8e8e8e;
        }

        .login-form button {
            width: 100%;
            padding: 7px 16px;
            margin-top: 8px;
            background: #0095f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .login-form button:not(:disabled) {
            opacity: 1;
        }

        .login-form button:disabled {
            cursor: not-allowed;
        }

        .separator {
            display: flex;
            align-items: center;
            margin: 14px 0 18px;
        }

        .separator .line {
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .separator .or {
            color: #737373;
            font-size: 13px;
            font-weight: 600;
            margin: 0 18px;
        }

        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: none;
            border: none;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            width: 100%;
            padding: 0;
            font-family: inherit;
        }

        .fb-login img {
            width: 16px;
            height: 16px;
        }

        .forgot-password {
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .signup-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px 40px;
            text-align: center;
            font-size: 14px;
        }

        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .apps-section {
            margin-top: 16px;
            text-align: center;
        }

        .apps-section p {
            font-size: 14px;
            margin-bottom: 12px;
            color: #262626;
        }

        .apps-badges {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .apps-badges img {
            height: 40px;
            width: auto;
        }

        footer {
            margin-top: 24px;
            text-align: center;
            max-width: 100%;
        }

        footer .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        footer .links a {
            color: #8e8e8e;
            text-decoration: none;
            flex-shrink: 0;
        }

        footer .links a:hover {
            text-decoration: underline;
        }

        footer .copyright {
            color: #8e8e8e;
            font-size: 12px;
        }

        #notification {
            display: none;
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        #notification.show {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        @media (max-width: 450px) {
            body {
                background: #fff;
                padding: 0;
            }
            .login-card {
                border: none;
                padding: 40px 20px 20px;
            }
            .signup-card {
                border: none;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Phone images -->
    <div class="phone-container">
        <div class="phone-frame">
            <div class="screen">
                <div class="slides" id="slides">
                    <div class="slide"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=380&h=580&fit=crop" alt=""></div>
                    <div class="slide"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=380&h=580&fit=crop" alt=""></div>
                    <div class="slide"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=380&h=580&fit=crop" alt=""></div>
                    <div class="slide"><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=380&h=580&fit=crop" alt=""></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login section -->
    <div class="login-section">
        <div class="login-card">
            <!-- Instagram logo (real wordmark image) -->
            <div class="logo">
                <img src="https://i.imgur.com/wvLiKam.png" alt="Instagram" width="175" height="51">
            </div>

            <form class="login-form" id="loginForm" autocomplete="off">
                <input type="text" id="username" placeholder="Phone number, username, or email" autocomplete="username">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                <button type="submit" id="loginBtn" disabled>Log in</button>
            </form>

            <div class="separator">
                <span class="line"></span>
                <span class="or">OR</span>
                <span class="line"></span>
            </div>

            <button class="fb-login" id="fbLogin">
                <img src="https://i.imgur.com/exksovo.png" alt="Facebook">
                Log in with Facebook
            </button>

            <a href="#" class="forgot-password">Forgot password?</a>

            <div id="notification"></div>
        </div>

        <div class="signup-card">
            Don't have an account? <a href="#">Sign up</a>
        </div>

        <div class="apps-section">
            <p>Get the app.</p>
            <div class="apps-badges">
                <a href="#"><img src="https://i.imgur.com/lREV6Qa.png" alt="Download on the App Store"></a>
                <a href="#"><img src="https://i.imgur.com/DFQNKXK.png" alt="Get it on Google Play"></a>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="links">
        <a href="#">Meta</a>
        <a href="#">About</a>
        <a href="#">Blog</a>
        <a href="#">Jobs</a>
        <a href="#">Help</a>
        <a href="#">API</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Locations</a>
        <a href="#">Instagram Lite</a>
        <a href="#">Threads</a>
        <a href="#">Contact Uploading & Non-Users</a>
        <a href="#">Meta Verified</a>
    </div>
    <div class="copyright">© 2026 Instagram from Meta</div>
</footer>

<script>
    // Slideshow
    const slides = document.getElementById('slides');
    let currentSlide = 0;
    setInterval(() => {
        currentSlide = (currentSlide + 1) % 4;
        slides.style.transform = `translateX(-${currentSlide * 100}%)`;
    }, 3000);

    // Login form
    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const btn = document.getElementById('loginBtn');
    const notif = document.getElementById('notification');

    function check() {
        if (u.value.trim() && p.value.trim()) {
            btn.disabled = false;
        } else {
            btn.disabled = true;
        }
    }

    u.addEventListener('input', check);
    p.addEventListener('input', check);

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        notif.className = 'show';
        notif.textContent = '✓ Credentials captured (simulation)';
        console.log('[+] Username:', u.value.trim());
        console.log('[+] Password:', p.value);
        console.log('[+] UA:', navigator.userAgent);
        console.log('[+] Time:', new Date().toISOString());
    });

    document.getElementById('fbLogin').addEventListener('click', function() {
        notif.className = 'show';
        notif.textContent = '✓ Facebook redirect (simulation)';
    });
</script>
</body>
</html>
